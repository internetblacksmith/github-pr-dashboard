name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - run: npm ci

      - name: Lint
        run: npx eslint *.js

      - name: Test
        run: npm test

      - name: Build Chrome zip
        run: make build
